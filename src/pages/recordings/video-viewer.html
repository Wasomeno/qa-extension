<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Video Viewer</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      video {
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .error {
        color: #ef4444;
        font-family: sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <video id="player" controls></video>
    <div id="error-message" class="error" style="display: none;"></div>
  </body>
</html>
